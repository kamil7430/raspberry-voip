<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfiguracja Telefonu VoIP</title>
    <style>
        /* Zmienne CSS dla łatwej zmiany kolorystyki */
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --border-color: #cccccc;
        }

        /* Reset i podstawowe ustawienia */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Zajmuje całą wysokość ekranu */
        }

        /* Styl kontenera formularza */
        .config-card {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
        }

        .config-card h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.5rem;
        }

        /* Elementy formularza */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box; /* Zapobiega wychodzeniu poza kontener */
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Efekt podświetlenia po kliknięciu w pole */
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
        }

        .help-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
        }

        /* Styl przycisku */
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

<div class="config-card">
    <h2>Ustawienia VoIP</h2>

    <form action="/save-config" method="POST">

        <div class="form-group">
            <label for="displayName">Nazwa wyświetlana</label>
            <input type="text" id="displayName" name="displayName" maxlength="16" value="{{ .DisplayName }}" required>
            <div class="help-text">Maks. 16 znaków (dopasowane do ekranu LCD).</div>
        </div>

        <button type="submit">Zapisz ustawienia</button>
    </form>
</div>

</body>
</html>
